<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
  <h1>회원수정</h1>
  <form th:action="@{/member/update}" method="post" th:object="${dto}">
    <div>
      <label>ID : [[*{id}]]</label>
      <input type="hidden" name="id" th:value="*{id}">
    </div>
    <div>
      <label>이름</label>
      <input type="text" name = "name" th:field="*{name}">
    </div>
    <div>
      <label>나이</label>
      <input type="number" name="age" min="0" max="120" th:field="*{age}">
    </div>
    <div>
      <label>주소</label>
      <input type="text" name="address" th:field="*{address}">
    </div>
    <input type="submit" value="등록">
  </form>
  <a href="/member/view">목록으로 돌아가기</a>
</body>
</html>
