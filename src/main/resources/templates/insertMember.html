<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
  <h1>회원등록</h1>
  <form th:action="@{/member/insert}" method="post", th:object="${dto}">
    <div>
      <label>이름</label>
      <input type="text" th:field="*{name}">
    </div>
    <div>
      <label>나이</label>
      <input type="number" th:field="*{age}" min="0" max="120">
    </div>
    <div>
      <label>주소</label>
      <input type="text" th:field="*{address}">
    </div>
    <input type="submit" value="등록">
  </form>
  <a href="/member/view">목록으로 돌아가기</a>
</body>
</html>
