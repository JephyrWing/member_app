<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <title>[[${title}]]</title>
  <style>
    th {
      background-color: lightgoldenrodyellow;
    }
    th, td {
      border: 1px solid black;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>회원정보</h1>
  <!--  완료 메시지 출력할 영역-->
  <div th:if="${message}">
    <div class="alert alert-warning alert-dismissible fade show" role="alert">
      [[${message}]]
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  </div>
  <table border="1">
    <thead>
      <tr>
        <th>ID</th>
        <th>이름</th>
        <th>나이</th>
        <th>주소</th>
        <th>수정</th>
        <th>삭제</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="dto : ${dtolist}" th:object="${dto}">
        <td th:text="*{id}">ID</td>
        <td th:text="*{name}">이름</td>
        <td th:text="*{age}">나이</td>
        <td th:text="*{address}">주소</td>
        <td>
          <form th:action="@{/member/update}" method="get">
            <input type="hidden" name="updateId" th:value="*{id}">
            <input type="submit" value="수정">
          </form>
        </td>
        <td>
            <form th:action="@{/member/delete}" onsubmit="return confirmDelete();" method="post">
              <input type="hidden" name="deleteId" th:value="*{id}">
              <input type="submit" value="삭제">
            </form>
        </td>
      </tr>
    </tbody>
  </table>
  <br>
  <form action="/member/insertForm" method="get">
    <input type="submit" value="신규회원입력">
  </form>
  <br>
  <form th:action="@{/member/search}" method="get">
    <select name="type">
      <option value="">검색 조건 선택</option>
      <option value="name">이름</option>
      <option value="address">주소</option>
    </select>
    <input type="text" name="keyword" placeholder="키워드 입력">
    <input type="submit" value="검색">
  </form>
</body>
<script>
  function confirmDelete(){
    return confirm("정말로 삭제하시겠습니까?")
  }
</script>
</html>
